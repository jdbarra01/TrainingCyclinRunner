services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: training
      POSTGRES_PASSWORD: training123
      POSTGRES_DB: training_cycling
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U training -d training_cycling"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://training:training123@db:5432/training_cycling?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
